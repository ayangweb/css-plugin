packages:
  - packages/*
  - examples/*

catalog:
  antdv-next: ^1.1.0

catalogs:
  dev:
    '@vue/tsconfig': ^0.8.1
    bumpp: ^10.4.1
    tsdown: ^0.20.3
    unocss: ^66.6.2
  example:
    '@types/node': ^24.11.0
    '@vitejs/plugin-vue': ^6.0.4
    '@vue/tsconfig': ^0.8.1
    typescript: ~5.9.3
    vite: ^8.0.0-beta.16
    vue: ^3.5.29
    vue-tsc: ^3.2.5
  v3:
    tailwindcss: ^3.4.19
  v4:
    tailwindcss: ^4.2.1

cleanupUnusedCatalogs: true

onlyBuiltDependencies:
  - esbuild

shellEmulator: true

trustPolicy: no-downgrade
