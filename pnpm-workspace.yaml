packages:
  - packages/*
  - examples/*

catalog:
  antdv-next: ^1.1.0

catalogs:
  dev:
    '@vue/tsconfig': ^0.8.1
    bumpp: ^10.3.2
    tailwindcss: ^3.4.17
    tsdown: ^0.20.1
    unocss: ^66.5.10
  example:
    '@types/node': ^24.10.1
    '@vitejs/plugin-vue': ^6.0.2
    '@vue/tsconfig': ^0.8.1
    typescript: ~5.9.3
    vite: ^8.0.0-beta.13
    vue: ^3.5.25
